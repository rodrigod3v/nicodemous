name: Nicodemouse CI/CD

on:
  push:
    branches: ["main", "server/client"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  build-windows:
    name: Build Windows (win-x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Prepare wwwroot
        run: |
          mkdir -p backend/wwwroot
          cp -r frontend/dist/* backend/wwwroot/

      - name: Publish Windows Standalone
        run: dotnet publish backend/nicodemouse_backend.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -f net8.0-windows -o ./publish/win

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nicodemouse-windows
          path: ./publish/win/nicodemouse_backend.exe

  build-macos:
    name: Build macOS (osx-arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Prepare wwwroot
        run: |
          mkdir -p backend/wwwroot
          cp -r frontend/dist/* backend/wwwroot/

      - name: Publish macOS Standalone
        run: dotnet publish backend/nicodemouse_backend.csproj -c Release -r osx-arm64 --self-contained true -p:PublishSingleFile=true -f net8.0 -o ./publish/mac

      - name: Create .app Bundle
        run: |
          mkdir -p "publish/nicodemouse.app/Contents/MacOS"
          mkdir -p "publish/nicodemouse.app/Contents/Resources"
          cp "publish/mac/nicodemouse_backend" "publish/nicodemouse.app/Contents/MacOS/nicodemouse"
          chmod +x "publish/nicodemouse.app/Contents/MacOS/nicodemouse"

          # Create Info.plist
          cat <<EOF > "publish/nicodemouse.app/Contents/Info.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>nicodemouse</string>
              <key>CFBundleIdentifier</key>
              <string>com.rodrigod3v.nicodemouse</string>
              <key>CFBundleName</key>
              <string>nicodemouse</string>
              <key>CFBundleVersion</key>
              <string>1.0.0</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.0</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSPrincipalClass</key>
              <string>NSApplication</string>
          </dict>
          </plist>
          EOF

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Generate DMG
        run: |
          create-dmg \
            --volname "nicodemouse Installer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "nicodemouse.app" 175 190 \
            --hide-extension "nicodemouse.app" \
            --app-drop-link 425 190 \
            "publish/nicodemouse-macos-arm64.dmg" \
            "publish/nicodemouse.app"

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nicodemouse-macos-dmg
          path: ./publish/nicodemouse-macos-arm64.dmg

  release:
    name: Create Release
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: nicodemouse-windows
          path: ./release

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: nicodemouse-macos-dmg
          path: ./release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release/nicodemouse_backend.exe
            ./release/nicodemouse-macos-arm64.dmg
          generate_release_notes: true
